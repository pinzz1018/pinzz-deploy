<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vexora Kraftly — AI Prompt Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0E12;
    --card:#17171D;
    --card-hover:#1D1D26;
    --border:#26262F;
    --text:#F4F2F7;
    --muted:#8B8896;
    --violet:#8B5CF6;
    --pink:#EC4899;
    --grad: linear-gradient(135deg, var(--violet), var(--pink));
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{
    overflow-x:hidden;
    width:100%;
  }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    width:100%;
    max-width:100vw;
  }
  img{max-width:100%;height:auto;}
  h1,h2,h3,.display{
    font-family:'Space Grotesk',sans-serif;
  }
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;}

  /* Header */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 32px;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    background:rgba(14,14,18,0.85);
    backdrop-filter:blur(10px);
    z-index:50;
  }
  .logo{
    font-size:20px;
    font-weight:700;
    letter-spacing:-0.02em;
  }
  .logo span{
    background:var(--grad);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .header-actions{display:flex;align-items:center;gap:12px;}
  .btn{
    padding:10px 18px;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
    transition:transform .15s ease, opacity .15s ease;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn-primary{
    background:var(--grad);
    color:#fff;
  }
  .btn-ghost{
    background:var(--card);
    color:var(--text);
    border:1px solid var(--border);
  }
  .btn-ghost:hover{background:var(--card-hover);}
  .user-pill{
    display:flex;align-items:center;gap:8px;
    padding:6px 14px 6px 6px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:999px;
    font-size:13px;
    color:var(--muted);
  }
  .user-pill img{width:26px;height:26px;border-radius:50%;}

  /* Hero */
  .hero{
    padding:64px 32px 40px;
    text-align:center;
    max-width:720px;
    margin:0 auto;
  }
  .hero .eyebrow{
    font-size:13px;
    color:var(--pink);
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .hero h1{
    font-size:42px;
    line-height:1.15;
    font-weight:700;
    letter-spacing:-0.02em;
    margin:0 0 14px;
  }
  .hero p{
    color:var(--muted);
    font-size:16px;
    line-height:1.6;
    margin:0;
  }

  /* Gallery */
  .gallery-wrap{max-width:1240px;margin:0 auto;padding:8px 32px 80px;}
  .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
    gap:20px;
  }
  .card{
    position:relative;
    border-radius:16px;
    overflow:hidden;
    background:var(--card);
    border:1px solid var(--border);
    aspect-ratio:1/1;
    cursor:pointer;
    transition:border-color .2s ease, transform .2s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    border-color:transparent;
  }
  .card::before{
    content:'';
    position:absolute;inset:0;
    border-radius:16px;
    padding:1.5px;
    background:var(--grad);
    opacity:0;
    transition:opacity .2s ease;
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    pointer-events:none;
  }
  .card:hover::before{opacity:1;}
  .card img{
    width:100%;height:100%;object-fit:cover;display:block;
  }
  .card .overlay{
    position:absolute;inset:0;
    background:linear-gradient(180deg, transparent 55%, rgba(0,0,0,0.85) 100%);
    display:flex;
    align-items:flex-end;
    padding:14px;
    opacity:0;
    transition:opacity .2s ease;
  }
  .card:hover .overlay{opacity:1;}
  .card .copy-btn{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(6px);
    color:#fff;
    padding:8px 14px;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    border:1px solid rgba(255,255,255,0.2);
  }
  .card .copy-btn:hover{background:rgba(255,255,255,0.22);}

  .empty-state{
    text-align:center;
    padding:80px 20px;
    color:var(--muted);
  }
  .empty-state h3{color:var(--text);margin-bottom:8px;}

  /* Modal */
  .modal-backdrop{
    position:fixed;inset:0;
    background:rgba(8,8,10,0.8);
    backdrop-filter:blur(4px);
    display:none;
    align-items:center;justify-content:center;
    z-index:200;
    padding:20px;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    max-width:480px;
    width:100%;
    max-height:90vh;
    overflow-y:auto;
    position:relative;
  }
  .modal-close{
    position:absolute;
    top:16px;left:16px;
    width:36px;height:36px;
    border-radius:50%;
    background:rgba(0,0,0,0.5);
    color:#fff;
    font-size:18px;
    display:flex;align-items:center;justify-content:center;
    z-index:10;
  }
  .modal-close:hover{background:rgba(0,0,0,0.7);}
  .modal img{
    width:100%;
    display:block;
    border-radius:20px 20px 0 0;
  }
  .modal-body{padding:20px;}
  .modal-body .prompt-text{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
    font-size:14px;
    line-height:1.6;
    color:var(--text);
    margin-bottom:16px;
    white-space:pre-wrap;
  }
  .modal-body .btn{width:100%;text-align:center;}

  /* Toast */
  .toast{
    position:fixed;
    bottom:28px;left:50%;
    transform:translate(-50%,20px);
    background:var(--text);
    color:var(--bg);
    padding:12px 22px;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
    opacity:0;
    transition:opacity .25s ease, transform .25s ease;
    z-index:300;
    pointer-events:none;
  }
  .toast.show{opacity:1;transform:translate(-50%,0);}

  /* Admin */
  .admin-wrap{
    max-width:640px;
    margin:0 auto;
    padding:48px 24px 100px;
  }
  .admin-wrap h2{font-size:26px;margin-bottom:6px;}
  .admin-wrap .sub{color:var(--muted);font-size:14px;margin-bottom:32px;}
  .field{margin-bottom:24px;}
  .field label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    margin-bottom:8px;
  }
  .field input[type=password],
  .field input[type=text],
  .field textarea{
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    color:var(--text);
    font-size:14px;
    font-family:inherit;
  }
  .field textarea{resize:vertical;min-height:110px;line-height:1.5;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--violet);}
  .field .hint{font-size:12px;color:var(--muted);margin-top:6px;}

  .upload-zone{
    border:1.5px dashed var(--border);
    border-radius:14px;
    padding:28px;
    text-align:center;
    background:var(--card);
    cursor:pointer;
    transition:border-color .15s ease;
  }
  .upload-zone:hover{border-color:var(--violet);}
  .upload-zone .icon{font-size:28px;margin-bottom:8px;}
  .upload-zone p{margin:0;color:var(--muted);font-size:14px;}
  .preview-img{
    width:100%;
    max-height:320px;
    object-fit:contain;
    border-radius:12px;
    margin-top:14px;
    background:#000;
  }

  .btn-block{width:100%;text-align:center;margin-top:10px;}
  .btn-block:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

  .divider{height:1px;background:var(--border);margin:28px 0;}

  .access-denied{
    text-align:center;
    padding:100px 20px;
    color:var(--muted);
  }

  .spinner{
    display:inline-block;
    width:16px;height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .7s linear infinite;
    vertical-align:middle;
    margin-right:8px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .status-msg{font-size:13px;margin-top:10px;color:var(--muted);}
  .status-msg.error{color:#F87171;}
  .status-msg.success{color:#34D399;}

  footer{
    text-align:center;
    padding:28px;
    color:var(--muted);
    font-size:13px;
    border-top:1px solid var(--border);
  }

  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important;}
  }

  @media (max-width:560px){
    header{padding:16px 18px;}
    .hero{padding:44px 18px 28px;}
    .hero h1{font-size:32px;}
    .gallery-wrap{padding:8px 18px 60px;}
  }
</style>
</head>
<body>

<header>
  <a href="#/" class="logo" onclick="navigate('home')">Vexora<span>Kraftly</span></a>
  <div class="header-actions" id="headerActions"></div>
</header>

<main id="app"></main>

<footer>Vexora Kraftly — kumpulan prompt AI, siap pakai.</footer>

<!-- Modal detail -->
<div class="modal-backdrop" id="modalBackdrop" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="modalImg" src="" alt="Preview prompt" />
    <div class="modal-body">
      <div class="prompt-text" id="modalPrompt"></div>
      <button class="btn btn-primary btn-block" onclick="copyModalPrompt()">Salin Prompt</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Prompt disalin</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVNgaVsRulynYIgpV68HatD5g7E9tbyf8",
  authDomain: "vexora-kraftly.firebaseapp.com",
  projectId: "vexora-kraftly",
  messagingSenderId: "1055810233906",
  appId: "1:1055810233906:web:2471da2fe59a4cf9427e2b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const ADMIN_UID = "eXLklj6fs7a5HJAZbNCeU7UHxpK2";

let currentUser = null;
let currentRoute = "home";
let promptsCache = [];
let groqApiKey = localStorage.getItem("vexKraf_groqKey") || "";
let generatedPrompt = "";
let uploadedFile = null;
let uploadedPreviewUrl = "";

// ---------- Router sederhana ----------
window.navigate = function(route){
  currentRoute = route;
  render();
};

// ---------- Auth ----------
window.signIn = async function(){
  try{
    await signInWithPopup(auth, provider);
  }catch(e){
    console.error(e);
    alert("Gagal masuk: " + e.message);
  }
};

window.signOutUser = async function(){
  await signOut(auth);
  navigate("home");
};

onAuthStateChanged(auth, (user) => {
  const wasAlreadyThisUser = currentUser && user && currentUser.uid === user.uid;
  currentUser = user;
  // Jangan render ulang paksa kalau user sama & sedang di admin panel dengan gambar
  // yang sudah dipilih — supaya state upload/preview tidak hilang saat token refresh.
  if(wasAlreadyThisUser && currentRoute === "admin" && uploadedFile){
    return;
  }
  render();
});

// ---------- Firestore: load prompts ----------
async function loadPrompts(){
  try{
    const q = query(collection(db, "prompts"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    promptsCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  }catch(e){
    console.error("Gagal memuat prompt:", e);
    promptsCache = [];
  }
}

// ---------- Toast ----------
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

// ---------- Modal ----------
let modalPromptText = "";
window.openModal = function(imgUrl, promptText){
  modalPromptText = promptText;
  document.getElementById("modalImg").src = imgUrl;
  document.getElementById("modalPrompt").textContent = promptText;
  document.getElementById("modalBackdrop").classList.add("open");
};
window.closeModal = function(){
  document.getElementById("modalBackdrop").classList.remove("open");
};
window.copyModalPrompt = async function(){
  await copyText(modalPromptText);
};
window.copyCard = async function(promptText, ev){
  ev.stopPropagation();
  await copyText(promptText);
};
async function copyText(text){
  try{
    await navigator.clipboard.writeText(text);
    showToast("Prompt disalin ✓");
  }catch(e){
    showToast("Gagal menyalin");
  }
}

// ---------- Render header ----------
function renderHeader(){
  const el = document.getElementById("headerActions");
  if(currentUser){
    const isAdmin = currentUser.uid === ADMIN_UID;
    el.innerHTML = `
      ${isAdmin ? `<button class="btn btn-ghost" onclick="navigate('admin')">Admin Panel</button>` : ""}
      <div class="user-pill">
        <img src="${currentUser.photoURL || ''}" alt=""/>
        <span>${escapeHtml(currentUser.displayName || currentUser.email || '')}</span>
      </div>
      <button class="btn btn-ghost" onclick="signOutUser()">Keluar</button>
    `;
  }else{
    el.innerHTML = `<button class="btn btn-primary" onclick="signIn()">Masuk dengan Google</button>`;
  }
}

function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

// ---------- Render halaman utama ----------
function renderHome(){
  const galleryHtml = promptsCache.length === 0
    ? `<div class="empty-state"><h3>Belum ada prompt</h3><p>Koleksi prompt akan tampil di sini.</p></div>`
    : `<div class="gallery">
        ${promptsCache.map(p => `
          <div class="card" onclick='openModal(${JSON.stringify(p.imageUrl)}, ${JSON.stringify(p.prompt)})'>
            <img src="${p.imageUrl}" alt="Prompt image" loading="lazy" />
            <div class="overlay">
              <button class="copy-btn" onclick='copyCard(${JSON.stringify(p.prompt)}, event)'>Salin Prompt</button>
            </div>
          </div>
        `).join("")}
      </div>`;

  return `
    <section class="hero">
      <div class="eyebrow">Galeri Prompt AI</div>
      <h1>Temukan prompt, langsung pakai.</h1>
      <p>Jelajahi kumpulan prompt siap salin untuk kebutuhan AI image generation kamu.</p>
    </section>
    <section class="gallery-wrap">${galleryHtml}</section>
  `;
}

// ---------- Render admin panel ----------
function renderAdmin(){
  if(!currentUser){
    return `<div class="access-denied"><h3>Perlu masuk</h3><p>Masuk dengan Google untuk mengakses halaman ini.</p></div>`;
  }
  if(currentUser.uid !== ADMIN_UID){
    return `<div class="access-denied"><h3>Akses ditolak</h3><p>Halaman ini khusus admin.</p></div>`;
  }

  return `
    <div class="admin-wrap">
      <h2>Admin Panel</h2>
      <div class="sub">Kelola prompt yang tampil di Vexora Kraftly.</div>

      <div class="field">
        <label for="groqKey">API Key Groq</label>
        <input type="password" id="groqKey" placeholder="gsk_..." value="${escapeHtml(groqApiKey)}" />
        <div class="hint">Key disimpan di browser ini (localStorage), tidak hilang saat refresh.</div>
      </div>

      <div class="field">
        <label>Unggah Gambar</label>
        <div id="uploadZone" class="upload-zone" onclick="document.getElementById('fileInput').click()">
          <div class="icon">🖼️</div>
          <p>Klik untuk pilih gambar</p>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)" />
        <img id="previewImg" class="preview-img" style="display:${uploadedFile ? 'block' : 'none'}" src="${uploadedPreviewUrl || ''}" />
      </div>

      <button class="btn btn-primary btn-block" id="generateBtn" onclick="generatePrompt()" ${(uploadedFile && groqApiKey && groqApiKey.trim()) ? "" : "disabled"}>
        Generate Prompt
      </button>
      <div class="status-msg" id="generateStatus"></div>

      <div class="field" style="margin-top:22px;" id="promptFieldWrap" style="display:none;">
        <label for="promptEdit">Prompt (bisa diedit)</label>
        <textarea id="promptEdit" oninput="generatedPrompt = this.value"></textarea>
      </div>

      <button class="btn btn-primary btn-block" id="uploadPageBtn" onclick="uploadToPage()" style="display:none;">
        Upload ke Halaman Vexora Kraftly
      </button>
      <div class="status-msg" id="uploadStatus"></div>
    </div>
  `;
}

// ---------- File select ----------
window.handleFileSelect = function(ev){
  const file = ev.target.files[0];
  if(!file) return;
  uploadedFile = file;
  uploadedPreviewUrl = URL.createObjectURL(file);
  const img = document.getElementById("previewImg");
  if(img){
    img.src = uploadedPreviewUrl;
    img.style.display = "block";
  }
  checkGenerateEnabled();
};

function checkGenerateEnabled(){
  const btn = document.getElementById("generateBtn");
  const keyInput = document.getElementById("groqKey");
  // sinkronkan groqApiKey dari input, jaga-jaga kalau variabel closure belum ke-update
  if(keyInput) groqApiKey = keyInput.value;
  const hasKey = !!(groqApiKey && groqApiKey.trim().length > 0);
  const hasFile = !!uploadedFile;
  if(btn) btn.disabled = !(hasFile && hasKey);
}

// pantau perubahan key supaya tombol generate aktif/nonaktif real-time
document.addEventListener("input", (e) => {
  if(e.target && e.target.id === "groqKey"){
    groqApiKey = e.target.value;
    localStorage.setItem("vexKraf_groqKey", groqApiKey);
    checkGenerateEnabled();
  }
});

// ---------- Generate prompt via Groq Vision ----------
window.generatePrompt = async function(){
  const statusEl = document.getElementById("generateStatus");
  const btn = document.getElementById("generateBtn");
  if(!uploadedFile || !groqApiKey.trim()){
    statusEl.textContent = "Isi API key dan pilih gambar terlebih dahulu.";
    statusEl.className = "status-msg error";
    return;
  }
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>Membuat prompt...`;
  statusEl.textContent = "";
  statusEl.className = "status-msg";

  try{
    const base64 = await fileToBase64(uploadedFile);
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${groqApiKey.trim()}`
      },
      body: JSON.stringify({
        model: "meta-llama/llama-4-scout-17b-16e-instruct",
        messages: [
          {
            role: "user",
            content: [
              {
                type: "text",
                text: `You are an expert prompt engineer for AI image generators (ChatGPT/DALL-E, Gemini, Midjourney). Analyze this image with extreme precision and write ONE single flowing descriptive paragraph in English that would let an AI recreate this image as identically as possible.

Cover ALL of the following in your description, woven naturally into the paragraph (do not use headers or bullet points, just flowing prose):
- Subject: exact number of people/objects, gender, approximate age, ethnicity/skin tone, body type, exact pose and body angle, head tilt, hand/arm position
- Face & expression: precise facial expression, eye state (open/closed/winking), gaze direction, mouth expression, eyebrow position
- Hair: exact color, length, texture, style, how it falls, any flyaway strands, accessories in hair
- Clothing: every visible garment, exact color, fabric texture, fit, pattern, any jewelry or accessories worn, how clothing drapes
- Skin & makeup: visible skin tone, texture, any makeup details, blemishes or distinguishing marks
- Lighting: direction, color temperature (warm/cool), intensity, shadows, highlights, any light sources visible (lamp, window, ring light)
- Background: every visible background element, wall color/texture, furniture, decorations, depth of field/blur level
- Composition & camera: camera angle (eye-level, low, high, selfie angle), framing (close-up, medium, full body), aspect ratio feel, focal length impression
- Color palette: dominant and accent colors throughout the whole image
- Photo style/quality: whether it looks like a phone selfie, professional photo, candid shot, its grain/sharpness level, color grading mood

Write it as ONE cohesive paragraph, extremely detailed and specific (not generic), as if instructing someone who has never seen the image to recreate it pixel-perfect. Do not add any commentary, explanation, or notes outside the paragraph. Start the paragraph with exactly: "Make this photo become"`
              },
              {
                type: "image_url",
                image_url: { url: `data:${uploadedFile.type};base64,${base64}` }
              }
            ]
          }
        ],
        temperature: 0.3,
        max_tokens: 1200
      })
    });

    if(!res.ok){
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData?.error?.message || `Groq API error (${res.status})`);
    }

    const data = await res.json();
    let text = data.choices?.[0]?.message?.content?.trim() || "";
    if(!text.toLowerCase().startsWith("make this photo become")){
      text = "Make this photo become " + text;
    }
    generatedPrompt = text;

    document.getElementById("promptFieldWrap").style.display = "block";
    document.getElementById("promptEdit").value = text;
    document.getElementById("uploadPageBtn").style.display = "block";

    statusEl.textContent = "Prompt berhasil dibuat. Kamu bisa mengeditnya sebelum upload.";
    statusEl.className = "status-msg success";
  }catch(e){
    console.error(e);
    statusEl.textContent = "Gagal membuat prompt: " + e.message;
    statusEl.className = "status-msg error";
  }finally{
    btn.disabled = false;
    btn.innerHTML = "Generate Prompt";
  }
};

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Resize + kompres gambar jadi data URL base64 kecil, aman buat disimpan
// langsung di field dokumen Firestore (limit 1MB per dokumen).
function fileToCompressedBase64(file, maxDim = 1280, quality = 0.75){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = reject;
    img.onload = () => {
      let { width, height } = img;
      if(width > maxDim || height > maxDim){
        const scale = maxDim / Math.max(width, height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);

      let dataUrl = canvas.toDataURL("image/jpeg", quality);

      // Kalau masih kegedean (>700KB), turunin quality lagi bertahap.
      let q = quality;
      while(dataUrl.length > 700_000 && q > 0.3){
        q -= 0.1;
        dataUrl = canvas.toDataURL("image/jpeg", q);
      }

      resolve(dataUrl);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- Upload ke halaman ----------
window.uploadToPage = async function(){
  const statusEl = document.getElementById("uploadStatus");
  const btn = document.getElementById("uploadPageBtn");
  const finalPrompt = document.getElementById("promptEdit").value.trim();

  if(!uploadedFile || !finalPrompt){
    statusEl.textContent = "Gambar dan prompt tidak boleh kosong.";
    statusEl.className = "status-msg error";
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>Mengunggah...`;
  statusEl.textContent = "";
  statusEl.className = "status-msg";

  try{
    const imageUrl = await fileToCompressedBase64(uploadedFile);

    await addDoc(collection(db, "prompts"), {
      imageUrl,
      prompt: finalPrompt,
      createdAt: serverTimestamp(),
      createdBy: currentUser.uid
    });

    statusEl.textContent = "Berhasil diunggah ke halaman Vexora Kraftly ✓";
    statusEl.className = "status-msg success";

    // reset form
    uploadedFile = null;
    generatedPrompt = "";
    document.getElementById("fileInput").value = "";
    document.getElementById("previewImg").style.display = "none";
    document.getElementById("promptFieldWrap").style.display = "none";
    document.getElementById("uploadPageBtn").style.display = "none";
    document.getElementById("generateBtn").disabled = true;

    await loadPrompts();
  }catch(e){
    console.error(e);
    statusEl.textContent = "Gagal mengunggah: " + e.message;
    statusEl.className = "status-msg error";
  }finally{
    btn.disabled = false;
    btn.innerHTML = "Upload ke Halaman Vexora Kraftly";
  }
};

// ---------- Render utama ----------
async function render(){
  renderHeader();
  const appEl = document.getElementById("app");

  if(currentRoute === "admin"){
    appEl.innerHTML = renderAdmin();
    checkGenerateEnabled();
  }else{
    if(promptsCache.length === 0){
      appEl.innerHTML = `<div class="empty-state"><h3>Memuat prompt...</h3></div>`;
      await loadPrompts();
    }
    appEl.innerHTML = renderHome();
  }
}

render();
