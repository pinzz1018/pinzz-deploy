<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vexora Kraftly — AI Prompt Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A10;
    --card:#15151D;
    --card-hover:#1D1D26;
    --border:#26262F;
    --text:#F4F2F7;
    --muted:#8B8896;
    --violet:#8B5CF6;
    --pink:#EC4899;
    --cyan:#22D3EE;
    --grad: linear-gradient(135deg, var(--violet), var(--pink));
    --grad-cyan: linear-gradient(135deg, #8B5CF6, #22D3EE);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{
    overflow-x:hidden;
    width:100%;
  }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    width:100%;
    max-width:100vw;
  }
  img{max-width:100%;height:auto;}
  h1,h2,h3,.display{
    font-family:'Space Grotesk',sans-serif;
  }
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;}

  /* Header */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    background:rgba(10,10,16,0.9);
    backdrop-filter:blur(10px);
    z-index:50;
    gap:10px;
  }
  .header-left, .header-right{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .icon-btn{
    width:44px;height:44px;
    border-radius:14px;
    background:transparent;
    border:1.5px solid var(--violet);
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    transition:background .15s ease, transform .15s ease;
  }
  .icon-btn:hover{background:rgba(139,92,246,0.12);transform:translateY(-1px);}
  .icon-btn:active{transform:translateY(0);}
  .icon-btn svg{width:20px;height:20px;}
  .logo{
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.02em;
    text-align:center;
    line-height:1.05;
  }
  .logo span{
    background:var(--grad-cyan);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .logo .subtxt{
    display:block;
    font-size:9px;
    letter-spacing:0.35em;
    color:var(--muted);
    font-weight:600;
    margin-top:1px;
  }
  .header-actions{display:flex;align-items:center;gap:12px;}
  .btn{
    padding:10px 18px;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
    transition:transform .15s ease, opacity .15s ease;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn-primary{
    background:var(--grad);
    color:#fff;
  }
  .btn-ghost{
    background:var(--card);
    color:var(--text);
    border:1px solid var(--border);
  }
  .btn-ghost:hover{background:var(--card-hover);}
  .user-pill{
    display:flex;align-items:center;gap:8px;
    padding:6px 14px 6px 6px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:999px;
    font-size:13px;
    color:var(--muted);
  }
  .user-pill img{width:26px;height:26px;border-radius:50%;}

  /* Hero (tidak dipakai di layout baru, dibiarkan untuk kompatibilitas) */
  .hero{display:none;}

  /* Filter tabs */
  .tabs-wrap{
    max-width:1240px;
    margin:0 auto;
    padding:18px 20px 4px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .tabs-wrap::-webkit-scrollbar{display:none;}
  .tabs{
    display:flex;
    align-items:center;
    gap:6px;
    border:1.5px solid var(--border);
    border-radius:999px;
    padding:6px;
    width:max-content;
    min-width:100%;
    justify-content:space-around;
    background:rgba(255,255,255,0.02);
  }
  .tab-btn{
    background:transparent;
    color:var(--muted);
    padding:10px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:600;
    white-space:nowrap;
    transition:all .15s ease;
  }
  .tab-btn.active{
    color:#fff;
    background:rgba(139,92,246,0.15);
    border:1.5px solid var(--cyan);
  }

  /* Gallery */
  .gallery-wrap{max-width:1240px;margin:0 auto;padding:16px 20px 80px;}
  .gallery{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:14px;
  }
  @media (min-width:640px){
    .gallery{grid-template-columns:repeat(auto-fill, minmax(220px,1fr));}
  }
  .card{
    position:relative;
    border-radius:18px;
    overflow:hidden;
    background:var(--card);
    border:1px solid var(--border);
    aspect-ratio:3/4;
    cursor:pointer;
    transition:border-color .2s ease, transform .2s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    border-color:transparent;
  }
  .card::before{
    content:'';
    position:absolute;inset:0;
    border-radius:18px;
    padding:1.5px;
    background:var(--grad-cyan);
    opacity:0;
    transition:opacity .2s ease;
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    pointer-events:none;
  }
  .card:hover::before{opacity:1;}
  .card img{
    width:100%;height:100%;object-fit:cover;display:block;
  }
  .badge-pop{
    position:absolute;top:10px;left:10px;
    display:flex;align-items:center;gap:5px;
    background:var(--cyan);
    color:#03181c;
    padding:6px 10px;
    border-radius:8px;
    font-size:11px;
    font-weight:800;
    letter-spacing:0.03em;
    text-transform:uppercase;
    z-index:2;
  }
  .badge-pop svg{width:12px;height:12px;}
  .fav-btn{
    position:absolute;top:10px;right:10px;
    width:32px;height:32px;
    border-radius:50%;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;
    color:#fff;
    z-index:2;
    transition:background .15s ease, color .15s ease;
  }
  .fav-btn:hover{background:rgba(0,0,0,0.65);}
  .fav-btn.active{color:#FACC15;}
  .fav-btn svg{width:16px;height:16px;}
  .card .views{
    position:absolute;bottom:10px;left:10px;
    display:flex;align-items:center;gap:5px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(4px);
    color:#fff;
    padding:5px 10px;
    border-radius:8px;
    font-size:12px;
    font-weight:600;
    z-index:2;
  }
  .card .views svg{width:14px;height:14px;}
  .card .overlay{
    position:absolute;inset:0;
    background:linear-gradient(180deg, transparent 45%, rgba(0,0,0,0.85) 100%);
    pointer-events:none;
  }

  .empty-state{
    text-align:center;
    padding:80px 20px;
    color:var(--muted);
  }
  .empty-state h3{color:var(--text);margin-bottom:8px;}

  /* Modal (detail full-screen ala Vexora Kraftly) */
  .modal-backdrop{
    position:fixed;inset:0;
    background:var(--bg);
    display:none;
    z-index:200;
    overflow-y:auto;
    opacity:0;
    transition:opacity .35s ease;
  }
  .modal-backdrop.open{display:block;}
  .modal-backdrop.open.animate-in{opacity:1;}
  .detail-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    position:sticky;
    top:0;
    background:rgba(10,10,16,0.9);
    backdrop-filter:blur(10px);
    z-index:5;
    opacity:0;
    transform:translateY(-14px);
    transition:opacity .45s cubic-bezier(.16,1,.3,1), transform .45s cubic-bezier(.16,1,.3,1);
  }
  .modal-backdrop.animate-in .detail-header{
    opacity:1;
    transform:translateY(0);
  }
  .modal{
    max-width:520px;
    width:100%;
    margin:0 auto;
    padding:20px 20px 40px;
    position:relative;
  }
  .modal-frame{
    position:relative;
    border-radius:24px;
    overflow:hidden;
    border:1.5px solid var(--cyan);
    box-shadow:0 0 0 1px rgba(34,211,238,0.15), 0 0 30px rgba(34,211,238,0.08);
    opacity:0;
    transform:translateY(28px) scale(0.96);
    transition:opacity .55s cubic-bezier(.16,1,.3,1) .08s, transform .55s cubic-bezier(.16,1,.3,1) .08s;
  }
  .modal-backdrop.animate-in .modal-frame{
    opacity:1;
    transform:translateY(0) scale(1);
  }
  .modal-frame img{
    width:100%;
    display:block;
  }
  .modal-badges{
    position:absolute;top:14px;left:14px;right:14px;
    display:flex;align-items:center;
    z-index:2;
    opacity:0;
    transform:translateY(-8px);
    transition:opacity .45s cubic-bezier(.16,1,.3,1) .32s, transform .45s cubic-bezier(.16,1,.3,1) .32s;
  }
  .modal-backdrop.animate-in .modal-badges{
    opacity:1;
    transform:translateY(0);
  }
  .badge-ai{
    display:flex;align-items:center;gap:6px;
    background:rgba(10,10,16,0.65);
    backdrop-filter:blur(6px);
    border:1px solid rgba(34,211,238,0.5);
    color:var(--cyan);
    padding:6px 12px;
    border-radius:999px;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.02em;
  }
  .badge-ai svg{width:13px;height:13px;}
  .modal-title-overlay{
    position:absolute;bottom:0;left:0;right:0;
    padding:60px 20px 22px;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,0.9));
    text-align:center;
    opacity:0;
    transform:translateY(10px);
    transition:opacity .45s cubic-bezier(.16,1,.3,1) .26s, transform .45s cubic-bezier(.16,1,.3,1) .26s;
  }
  .modal-backdrop.animate-in .modal-title-overlay{
    opacity:1;
    transform:translateY(0);
  }
  .modal-title-overlay h2{
    font-size:24px;
    font-weight:700;
    margin:0;
    line-height:1.3;
  }
  .modal-body{
    padding:22px 2px 0;
    opacity:0;
    transform:translateY(18px);
    transition:opacity .5s cubic-bezier(.16,1,.3,1) .36s, transform .5s cubic-bezier(.16,1,.3,1) .36s;
  }
  .modal-backdrop.animate-in .modal-body{
    opacity:1;
    transform:translateY(0);
  }
  .modal-body .prompt-text{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
    font-size:14px;
    line-height:1.65;
    color:var(--text);
    margin-bottom:18px;
    white-space:pre-wrap;
    display:none;
  }
  .modal-body .prompt-text.show{display:block;}
  .modal-actions{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .btn-generate{
    flex:1;
    background:var(--grad-cyan);
    color:#fff;
    padding:16px 20px;
    border-radius:14px;
    font-size:16px;
    font-weight:700;
    display:flex;align-items:center;justify-content:center;gap:8px;
    text-align:center;
  }
  .generate-btn-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .generate-loading-bar{
    display:none;
    width:100%;
    height:3px;
    border-radius:999px;
    background:rgba(255,255,255,0.12);
    overflow:hidden;
    position:relative;
  }
  .generate-loading-bar.active{display:block;}
  .generate-loading-bar::after{
    content:"";
    position:absolute;
    top:0;left:0;
    height:100%;
    width:40%;
    border-radius:999px;
    background:var(--grad-cyan);
    animation:generateLoadingSlide 1.1s ease-in-out infinite;
  }
  @keyframes generateLoadingSlide{
    0%{left:-40%;width:40%;}
    50%{width:60%;}
    100%{left:100%;width:40%;}
  }
  .btn-download{
    width:54px;height:54px;
    border-radius:50%;
    background:transparent;
    border:1.5px solid var(--violet);
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    opacity:1;
    transform:scale(1);
    transition:opacity .25s ease, transform .25s ease;
  }
  .btn-download.hidden{
    opacity:0;
    transform:scale(0.7);
    pointer-events:none;
    width:0;
    height:0;
    border:none;
    margin:0;
  }
  .btn-download svg{width:20px;height:20px;}

  /* Toast */
  .toast{
    position:fixed;
    bottom:28px;left:50%;
    transform:translate(-50%,20px);
    background:var(--text);
    color:var(--bg);
    padding:12px 22px;
    border-radius:10px;
    font-size:14px;
    font-weight:600;
    opacity:0;
    transition:opacity .25s ease, transform .25s ease;
    z-index:300;
    pointer-events:none;
  }
  .toast.show{opacity:1;transform:translate(-50%,0);}

  /* Admin */
  .admin-wrap{
    max-width:640px;
    margin:0 auto;
    padding:48px 24px 100px;
    position:relative;
  }
  .admin-close-btn{
    position:absolute;
    top:16px;
    left:16px;
    width:38px;
    height:38px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.04);
    color:var(--text, #fff);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:background .15s ease, transform .15s ease;
  }
  .admin-close-btn:hover{background:rgba(139,92,246,0.12);transform:translateY(-1px);}
  .admin-close-btn:active{transform:translateY(0);}
  .admin-close-btn svg{width:18px;height:18px;}
  .admin-wrap h2{font-size:26px;margin-bottom:6px;}
  .admin-wrap .sub{color:var(--muted);font-size:14px;margin-bottom:32px;}
  .field{margin-bottom:24px;}
  .field label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    margin-bottom:8px;
  }
  .field input[type=password],
  .field input[type=text],
  .field textarea{
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    color:var(--text);
    font-size:14px;
    font-family:inherit;
  }
  .field textarea{resize:vertical;min-height:110px;line-height:1.5;}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--violet);}
  .field .hint{font-size:12px;color:var(--muted);margin-top:6px;}

  .upload-zone{
    border:1.5px dashed var(--border);
    border-radius:14px;
    padding:28px;
    text-align:center;
    background:var(--card);
    cursor:pointer;
    transition:border-color .15s ease;
  }
  .upload-zone:hover{border-color:var(--violet);}
  .upload-zone .icon{font-size:28px;margin-bottom:8px;}
  .upload-zone p{margin:0;color:var(--muted);font-size:14px;}
  .preview-img{
    width:100%;
    max-height:320px;
    object-fit:contain;
    border-radius:12px;
    margin-top:14px;
    background:#000;
  }

  .btn-block{width:100%;text-align:center;margin-top:10px;}
  .btn-block:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

  .divider{height:1px;background:var(--border);margin:28px 0;}

  .access-denied{
    text-align:center;
    padding:100px 20px;
    color:var(--muted);
  }

  .spinner{
    display:inline-block;
    width:16px;height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin .7s linear infinite;
    vertical-align:middle;
    margin-right:8px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .status-msg{font-size:13px;margin-top:10px;color:var(--muted);}
  .status-msg.error{color:#F87171;}
  .status-msg.success{color:#34D399;}

  footer{
    text-align:center;
    padding:28px;
    color:var(--muted);
    font-size:13px;
    border-top:1px solid var(--border);
  }

  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important;}
  }

  @media (max-width:560px){
    header{padding:14px 16px;}
    .gallery-wrap{padding:12px 16px 60px;}
    .tabs-wrap{padding:14px 16px 4px;}
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <button class="icon-btn" title="Cari" onclick="showToast('Fitur pencarian segera hadir')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="icon-btn" title="Trending" onclick="navigate('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
    </button>
  </div>
  <a href="#/" class="logo" onclick="navigate('home')">Vexora<span> Kraftly</span></a>
  <div class="header-right" id="headerActions">
    <button class="icon-btn" title="Premium" onclick="navigate('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20M4 20l1.5-9L9 14l3-7 3 7 3.5-3L20 20"/></svg>
    </button>
    <button class="icon-btn" title="Menu" onclick="navigate('admin')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
  </div>
</header>

<main id="app"></main>

<footer>Vexora Kraftly — kumpulan prompt AI, siap pakai.</footer>

<!-- Modal detail -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="detail-header">
    <button class="icon-btn" onclick="closeModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <a href="#/" class="logo" onclick="navigate('home')">Vexora<span> Kraftly</span></a>
    <button class="icon-btn fav-toggle" id="modalFavBtn" onclick="toggleModalFav()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </button>
  </div>
  <div class="modal">
    <div class="modal-frame">
      <div class="modal-badges">
        <span class="badge-ai"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.5 5.5L19 9l-5.5 1.5L12 16l-1.5-5.5L5 9l5.5-1.5z"/></svg>AI Generated</span>
      </div>
      <img id="modalImg" src="" alt="Preview prompt" />
      <div class="modal-title-overlay">
        <h2 id="modalTitle">Cinematic Mirror Selfie Portrait</h2>
      </div>
    </div>
    <div class="modal-body">
      <div class="prompt-text" id="modalPrompt"></div>
      <div class="modal-actions">
        <div class="generate-btn-wrap">
          <button class="btn-generate" id="modalGenerateBtn" onclick="revealModalPrompt()">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 2l1.5 5.5L19 9l-5.5 1.5L12 16l-1.5-5.5L5 9l5.5-1.5z"/></svg>
            Generate Prompt
          </button>
          <div class="generate-loading-bar" id="modalGenerateLoadingBar"></div>
        </div>
        <button class="btn-download hidden" id="modalCopyBtn" onclick="copyModalPrompt()" title="Salin prompt">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Prompt disalin</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {

function pseudoViews(id){
  // Angka views konsisten per item, dihasilkan dari id-nya (bukan acak setiap render).
  let hash = 0;
  for(let i=0;i<id.length;i++){ hash = (hash * 31 + id.charCodeAt(i)) >>> 0; }
  return 1000 + (hash % 8000);
}

// ---------- Generate prompt via Groq Vision ----------
window.generatePrompt = async function(){
  const statusEl = document.getElementById("generateStatus");
  const btn = document.getElementById("generateBtn");
  if(!uploadedFile || !groqApiKey.trim()){
    statusEl.textContent = "Isi API key dan pilih gambar terlebih dahulu.";
    statusEl.className = "status-msg error";
    return;
  }
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>Membuat prompt...`;
  statusEl.textContent = "";
  statusEl.className = "status-msg";

  try{
    const base64 = await fileToBase64(uploadedFile);
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${groqApiKey.trim()}`
      },
      body: JSON.stringify({
        model: "meta-llama/llama-4-scout-17b-16e-instruct",
        messages: [
          {
            role: "user",
            content: [
              {
                type: "text",
                text: `You are an expert prompt engineer for AI image generators (ChatGPT/DALL-E, Gemini, Midjourney). Analyze this image with extreme precision and write ONE single flowing descriptive paragraph in English that would let an AI recreate this image as identically and pixel-accurately as possible.

Cover ALL of the following in your description, woven naturally into the paragraph (do not use headers or bullet points, just flowing prose):
- Subject: exact number of people/objects, gender, approximate age, ethnicity/skin tone, body type, exact pose and body angle, head tilt, hand/arm position
- Face & expression: precise facial expression, eye state (open/closed/winking), gaze direction, mouth expression, eyebrow position
- Hair: exact color, length, texture, style, how it falls, any flyaway strands, accessories in hair
- Clothing: every visible garment, exact color, fabric texture, fit, pattern, any jewelry or accessories worn, how clothing drapes
- Skin & makeup: visible skin tone, texture, any makeup details, blemishes or distinguishing marks
- Lighting: direction, color temperature (warm/cool), intensity, shadows, highlights, any light sources visible (lamp, window, ring light)
- Background: every visible background element, wall color/texture, furniture, decorations, depth of field/blur level
- Composition & camera: camera angle (eye-level, low, high, selfie angle), framing (close-up, medium, full body), aspect ratio feel, focal length impression
- Color palette: dominant and accent colors throughout the whole image
- Photo style/quality: whether it looks like a phone selfie, professional photo, candid shot, its grain/sharpness level, color grading mood

Write it as ONE cohesive paragraph, extremely detailed and specific (not generic), as if instructing someone who has never seen the image to recreate it pixel-perfect so the output looks 100% identical to the original when generated in ChatGPT/Gemini.

IMPORTANT — opening phrase: do NOT always start with "Make this photo become". Instead, pick an opening phrase that naturally fits what is actually in the image, and vary it each time so it doesn't feel repetitive. Choose (or invent something similar in spirit to) one of these styles depending on the image content, then continue directly into the detailed description:
- If it's a person/portrait/selfie: e.g. "Generate a photo of a person...", "Create a realistic image of a woman/man who...", "Recreate this exact portrait of..."
- If it's a product/object: e.g. "Generate a product photo of...", "Create a highly detailed image showing..."
- If it's a landscape/place: e.g. "Generate a photorealistic scene of...", "Recreate this exact location showing..."
- If it's food: e.g. "Generate a photo of a dish that..."
- Or any other natural, varied opening that fits the actual subject of the image.

Only output the final paragraph itself, starting directly with your chosen opening phrase blended into the sentence. Do not add any commentary, explanation, labels, or notes outside the paragraph.`
              },
              {
                type: "image_url",
                image_url: { url: `data:${uploadedFile.type};base64,${base64}` }
              }
            ]
          }
        ],
        temperature: 0.6,
        max_tokens: 1200
      })
    });

    if(!res.ok){
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData?.error?.message || `Groq API error (${res.status})`);
    }

    const data = await res.json();
    let text = data.choices?.[0]?.message?.content?.trim() || "";
    generatedPrompt = text;

    document.getElementById("promptFieldWrap").style.display = "block";
    document.getElementById("promptEdit").value = text;
    document.getElementById("uploadPageBtn").style.display = "block";

    statusEl.textContent = "Prompt berhasil dibuat. Kamu bisa mengeditnya sebelum upload.";
    statusEl.className = "status-msg success";
  }catch(e){
    console.error(e);
    statusEl.textContent = "Gagal membuat prompt: " + e.message;
    statusEl.className = "status-msg error";
  }finally{
    btn.disabled = false;
    btn.innerHTML = "Generate Prompt";
  }
};

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Resize + kompres gambar jadi data URL base64 kecil, aman buat disimpan
// langsung di field dokumen Firestore (limit 1MB per dokumen).
function fileToCompressedBase64(file, maxDim = 1280, quality = 0.75){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = reject;
    img.onload = () => {
      let { width, height } = img;
      if(width > maxDim || height > maxDim){
        const scale = maxDim / Math.max(width, height);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);

      let dataUrl = canvas.toDataURL("image/jpeg", quality);

      // Kalau masih kegedean (>700KB), turunin quality lagi bertahap.
      let q = quality;
      while(dataUrl.length > 700_000 && q > 0.3){
        q -= 0.1;
        dataUrl = canvas.toDataURL("image/jpeg", q);
      }

      resolve(dataUrl);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- Upload ke halaman ----------
window.uploadToPage = async function(){
  const statusEl = document.getElementById("uploadStatus");
  const btn = document.getElementById("uploadPageBtn");
  const finalPrompt = document.getElementById("promptEdit").value.trim();

  if(!uploadedFile || !finalPrompt){
    statusEl.textContent = "Gambar dan prompt tidak boleh kosong.";
    statusEl.className = "status-msg error";
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>Mengunggah...`;
  statusEl.textContent = "";
  statusEl.className = "status-msg";

  try{
    const imageUrl = await fileToCompressedBase64(uploadedFile);

    await addDoc(collection(db, "prompts"), {
      imageUrl,
      prompt: finalPrompt,
      createdAt: serverTimestamp(),
      createdBy: currentUser.uid
    });

    statusEl.textContent = "Berhasil diunggah ke halaman Vexora Kraftly ✓";
    statusEl.className = "status-msg success";

    // reset form
    uploadedFile = null;
    generatedPrompt = "";
    document.getElementById("fileInput").value = "";
    document.getElementById("previewImg").style.display = "none";
    document.getElementById("promptFieldWrap").style.display = "none";
    document.getElementById("uploadPageBtn").style.display = "none";
    document.getElementById("generateBtn").disabled = true;

    await loadPrompts();
  }catch(e){
    console.error(e);
    statusEl.textContent = "Gagal mengunggah: " + e.message;
    statusEl.className = "status-msg error";
  }finally{
    btn.disabled = false;
    btn.innerHTML = "Upload ke Halaman Vexora Kraftly";
  }
};

async function render(){
  renderHeader();
  const appEl = document.getElementById("app");

  if(currentRoute === "admin"){
    appEl.innerHTML = renderAdmin();
    checkGenerateEnabled();
  }else{
    if(promptsCache.length === 0){
      appEl.innerHTML = `<div class="empty-state"><h3>Memuat prompt...</h3></div>`;
      await loadPrompts();
    }
    appEl.innerHTML = renderHome();
  }
}

render();
